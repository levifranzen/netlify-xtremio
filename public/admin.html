<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xtremio — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080809;
      --surface:  #0f0f12;
      --surface2: #161619;
      --border:   #1e1e24;
      --accent:   #e8ff47;
      --red:      #ff4747;
      --green:    #47ff8a;
      --blue:     #47c8ff;
      --text:     #dddde8;
      --muted:    #4a4a5a;
      --mono:     'JetBrains Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

    /* ── Login gate ── */
    #loginGate {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    #loginGate h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    #loginGate h1 span { color: var(--accent); }
    #loginGate input {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 14px;
      padding: 12px 16px; border-radius: 4px; width: 300px; outline: none;
    }
    #loginGate input:focus { border-color: var(--accent); }
    #loginGate button {
      width: 300px; background: var(--accent); color: #080809;
      border: none; border-radius: 4px; font-family: var(--sans);
      font-weight: 700; font-size: 14px; padding: 12px; cursor: pointer;
    }
    #loginGate .err { color: var(--red); font-family: var(--mono); font-size: 12px; }

    /* ── Layout ── */
    #app { display: none; min-height: 100vh; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 32px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .topbar-logo { font-size: 18px; font-weight: 800; }
    .topbar-logo span { color: var(--accent); }
    .topbar-tag { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px 32px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--accent); border-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 24px; margin-bottom: 16px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-title { font-size: 14px; font-weight: 700; }

    /* ── Form elements ── */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .field input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 13px;
      padding: 9px 12px; border-radius: 4px; outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 4px; font-family: var(--sans); font-weight: 600; font-size: 13px; cursor: pointer; border: none; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-accent  { background: var(--accent);  color: #080809; }
    .btn-red     { background: rgba(255,71,71,0.12); color: var(--red); border: 1px solid rgba(255,71,71,0.25); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.01); }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-family: var(--mono); font-size: 10px; }
    .badge-green { background: rgba(71,255,138,0.1); color: var(--green); border: 1px solid rgba(71,255,138,0.2); }
    .badge-red   { background: rgba(255,71,71,0.1);  color: var(--red);   border: 1px solid rgba(255,71,71,0.2); }
    .badge-blue  { background: rgba(71,200,255,0.1); color: var(--blue);  border: 1px solid rgba(71,200,255,0.2); }

    /* ── Stat row ── */
    .stat-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .stat b { color: var(--text); font-weight: 500; }

    /* ── Key reveal ── */
    .key-reveal {
      background: var(--surface2); border: 1px solid rgba(232,255,71,0.3);
      border-radius: 4px; padding: 16px; margin-top: 16px;
    }
    .key-reveal .key-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .key-reveal .key-value { font-family: var(--mono); font-size: 13px; color: var(--accent); word-break: break-all; cursor: pointer; }
    .key-reveal .key-warn { font-family: var(--mono); font-size: 11px; color: var(--red); margin-top: 8px; }

    /* ── Hash mono ── */
    .hash { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 48px 0; color: var(--muted); font-size: 13px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px 20px;
      font-family: var(--mono); font-size: 12px; color: var(--text);
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<!-- Login Gate -->
<div id="loginGate">
  <h1>Xtrem<span>io</span> Admin</h1>
  <input type="password" id="secretInput" placeholder="Admin secret…" onkeydown="if(event.key==='Enter')login()" />
  <button onclick="login()">Enter</button>
  <span class="err" id="loginErr"></span>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Xtrem<span>io</span> <span style="color:var(--muted);font-size:13px;font-weight:400">Admin</span></div>
    <div class="topbar-tag" id="topbarEnv"></div>
  </div>

  <div class="container">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('keys')">API Keys</div>
      <div class="tab" onclick="switchTab('blocked')">Blocked Providers</div>
    </div>

    <!-- ── Keys panel ── -->
    <div class="panel active" id="panel-keys">

      <!-- Create key -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Generate new API key</div>
        </div>
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
          <div class="field" style="flex:1;min-width:200px;margin:0">
            <label>Label (for your reference)</label>
            <input type="text" id="newKeyLabel" placeholder="user@example.com" />
          </div>
          <button class="btn btn-accent" onclick="createKey()">+ Generate key</button>
        </div>
        <div id="newKeyReveal" style="display:none"></div>
      </div>

      <!-- Keys list -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Active keys</div>
          <button class="btn btn-outline" onclick="loadKeys()" style="font-size:12px;padding:6px 12px">↻ Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Label</th>
                <th>Hash (truncated)</th>
                <th>Created</th>
                <th>Status</th>
                <th>Usage</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="keysTable">
              <tr><td colspan="6" class="empty">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── Blocked panel ── -->
    <div class="panel" id="panel-blocked">

      <!-- Block form -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Block a provider</div>
        </div>
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
          <div class="field" style="flex:1;min-width:220px;margin:0">
            <label>Provider hash (16-char hex)</label>
            <input type="text" id="blockHash" placeholder="a1b2c3d4e5f6a1b2" />
          </div>
          <div class="field" style="flex:1;min-width:180px;margin:0">
            <label>Reason</label>
            <input type="text" id="blockReason" placeholder="Abuse / spam" />
          </div>
          <button class="btn btn-red" onclick="blockProvider()">Block</button>
        </div>
      </div>

      <!-- Blocked list -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Blocked providers</div>
          <button class="btn btn-outline" onclick="loadBlocked()" style="font-size:12px;padding:6px 12px">↻ Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Provider hash</th>
                <th>Reason</th>
                <th>Blocked at</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="blockedTable">
              <tr><td colspan="4" class="empty">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = '/.netlify/functions/admin';
  let ADMIN_SECRET = '';

  // ── Auth ──────────────────────────────────────────────────────────────────

  async function login() {
    const secret = document.getElementById('secretInput').value.trim();
    if (!secret) return;

    const res = await fetch(`${API}?action=list-keys`, { headers: { 'x-admin-secret': secret } });
    if (res.status === 401) {
      document.getElementById('loginErr').textContent = 'Invalid secret.';
      return;
    }
    ADMIN_SECRET = secret;
    document.getElementById('loginGate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('topbarEnv').textContent = window.location.hostname;
    loadKeys();
    loadBlocked();
  }

  function adminFetch(path, opts = {}) {
    return fetch(`${API}${path}`, {
      ...opts,
      headers: { 'x-admin-secret': ADMIN_SECRET, 'Content-Type': 'application/json', ...(opts.headers || {}) },
    });
  }

  // ── Tabs ─────────────────────────────────────────────────────────────────

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['keys','blocked'][i] === name));
    document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${name}`));
  }

  // ── Keys ─────────────────────────────────────────────────────────────────

  async function loadKeys() {
    const tbody = document.getElementById('keysTable');
    tbody.innerHTML = '<tr><td colspan="6" class="empty">Loading…</td></tr>';
    const res = await adminFetch('?action=list-keys');
    const { keys } = await res.json();

    if (!keys || keys.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No API keys yet. Generate one above.</td></tr>';
      return;
    }

    tbody.innerHTML = keys.map(k => `
      <tr>
        <td>${k.label || '—'}</td>
        <td class="hash">${k.keyHash.slice(0,16)}…</td>
        <td class="hash">${k.createdAt ? new Date(k.createdAt).toLocaleDateString() : '—'}</td>
        <td>${k.revoked
          ? '<span class="badge badge-red">Revoked</span>'
          : '<span class="badge badge-green">Active</span>'}</td>
        <td>
          <div class="stat-row">
            <div class="stat">Req <b>${k.stats?.requests || 0}</b></div>
            <div class="stat">Streams <b>${(k.stats?.streams_movie || 0) + (k.stats?.streams_series || 0) + (k.stats?.streams_live || 0)}</b></div>
            <div class="stat">Configs <b>${k.stats?.configurations || 0}</b></div>
          </div>
        </td>
        <td>
          ${!k.revoked ? `<button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="revokeKey('${k.keyHash}')">Revoke</button>` : ''}
        </td>
      </tr>
    `).join('');
  }

  async function createKey() {
    const label = document.getElementById('newKeyLabel').value.trim() || 'Unnamed';
    const res = await adminFetch('?action=create-key', { method: 'POST', body: JSON.stringify({ label }) });
    const data = await res.json();

    document.getElementById('newKeyReveal').style.display = 'block';
    document.getElementById('newKeyReveal').innerHTML = `
      <div class="key-reveal">
        <div class="key-label">New API key — copy now, won't be shown again</div>
        <div class="key-value" onclick="copyText('${data.apiKey}', this)" title="Click to copy">${data.apiKey}</div>
        <div class="key-warn">⚠ This key is shown once. Store it securely before closing this panel.</div>
      </div>
    `;
    document.getElementById('newKeyLabel').value = '';
    toast('Key created');
    loadKeys();
  }

  async function revokeKey(hash) {
    if (!confirm('Revoke this API key? All users with this key will lose access immediately.')) return;
    await adminFetch('?action=revoke-key', { method: 'POST', body: JSON.stringify({ keyHash: hash }) });
    toast('Key revoked');
    loadKeys();
  }

  // ── Blocked ──────────────────────────────────────────────────────────────

  async function loadBlocked() {
    const tbody = document.getElementById('blockedTable');
    tbody.innerHTML = '<tr><td colspan="4" class="empty">Loading…</td></tr>';
    const res = await adminFetch('?action=list-blocked');
    const { blocked } = await res.json();

    if (!blocked || blocked.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">No blocked providers.</td></tr>';
      return;
    }

    tbody.innerHTML = blocked.map(b => `
      <tr>
        <td class="hash">${b.providerHash}</td>
        <td>${b.reason || '—'}</td>
        <td class="hash">${b.blockedAt ? new Date(b.blockedAt).toLocaleString() : '—'}</td>
        <td>
          <button class="btn btn-outline" style="font-size:11px;padding:5px 10px" onclick="unblockProvider('${b.providerHash}')">Unblock</button>
        </td>
      </tr>
    `).join('');
  }

  async function blockProvider() {
    const providerHash = document.getElementById('blockHash').value.trim();
    const reason = document.getElementById('blockReason').value.trim() || 'Blocked by admin';
    if (!providerHash) { toast('Enter a provider hash'); return; }

    await adminFetch('?action=block-provider', { method: 'POST', body: JSON.stringify({ providerHash, reason }) });
    document.getElementById('blockHash').value = '';
    document.getElementById('blockReason').value = '';
    toast('Provider blocked');
    loadBlocked();
  }

  async function unblockProvider(providerHash) {
    await adminFetch('?action=unblock-provider', { method: 'POST', body: JSON.stringify({ providerHash }) });
    toast('Provider unblocked');
    loadBlocked();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function copyText(text, el) {
    navigator.clipboard.writeText(text);
    if (el) { const orig = el.textContent; el.textContent = '✓ Copied!'; setTimeout(() => el.textContent = orig, 1500); }
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // Allow Enter on login
  document.getElementById('secretInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
